{{- if .Values.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: otel-monitor
spec:
  podMetricsEndpoints:
  - interval: 15s
    port: metrics
    path: /metrics
  {{- if .Values.sidecars.envoy.enabled }}
  - interval: 15s
    port: envoy-admin
    path: /stats/prometheus
  {{- end }}
  selector:
    matchExpressions:
    - { key: app,
        operator: In,
        values: [{{ .Values.services.agent.serviceName }},
                 {{ .Values.services.service.serviceName }},
                 {{ .Values.services.worker.serviceName }},
                 {{ .Values.services.logger.serviceName }},
                 {{ .Values.services.delayedJobMonitor.serviceName }}]
      }
{{- end }}
