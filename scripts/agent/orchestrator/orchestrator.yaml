# OSMO Agent Workflow — Unified Template
#
# Every agent at every level runs this same workflow. The only difference
# is SUBTASK_ID:
#   - Root agent:  SUBTASK_ID="" → reads task prompt, decomposes entire task
#   - Child agent: SUBTASK_ID="st-004" → reads .agent/subtasks/st-004.json
#
# Static framework (prompt, tools) is baked into the image at /osmo/agent/.
# Dynamic content (knowledge docs, code, state) comes from git.
#
# To submit as root:
#   osmo workflow submit /osmo/agent/orchestrator.yaml \
#     --set task_prompt="Migrate Pydantic v1 to v2.12.5" \
#     --set knowledge_doc=docs/agent/pydantic-v2-migration.md
#
# To submit as child (called by submit-child.sh):
#   osmo workflow submit /osmo/agent/orchestrator.yaml \
#     --set subtask_id=st-004 --set workflow_name=agent-st-004

workflow:
  name: "{{workflow_name}}"
  resources:
    default:
      cpu: 2
      memory: 4Gi
      storage: 20Gi

  tasks:
  - name: agent
    image: "{{agent_image}}"
    command: [/bin/bash]
    args: [/tmp/entry.sh]
    exitActions:
      COMPLETE: 0
      RESCHEDULE: 1-79
      FAIL: 80-99
    credentials:
      github-pat: /tmp/github
      nv-api-key:
        NV_API_KEY: nv-api-key
    environment:
      GITHUB_REPO: "{{github_repo}}"
      BRANCH_NAME: "{{branch_name}}"
      STORAGE_URI: "{{storage_uri}}"
      TASK_PROMPT: "{{task_prompt}}"
      KNOWLEDGE_DOC: "{{knowledge_doc}}"
      COMMIT_PREFIX: "{{commit_prefix}}"
      SUBTASK_ID: "{{subtask_id}}"
      ADDITIONAL_CONTEXT: "{{additional_context}}"
    files:
    - path: /tmp/setup_git.sh
      contents: |-
        #!/usr/bin/env bash
        set -euo pipefail
        GITHUB_PAT=$(cat /tmp/github/github-pat)
        git config --global credential.helper store
        echo "https://token:${GITHUB_PAT}@github.com" > ~/.git-credentials
        git config --global credential.helper 'store --file ~/.git-credentials'
        git config --global user.name "osmo-agent"
        git config --global user.email "osmo-agent@nvidia.com"

    - path: /tmp/entry.sh
      contents: |-
        #!/usr/bin/env bash
        # Unified entry script for all agent levels.
        #
        # Static framework:  /osmo/agent/ (baked into image)
        # Dynamic content:   /workspace/repo (cloned from git)
        set -euo pipefail

        echo "=== OSMO Agent ==="
        echo "Repo:     ${GITHUB_REPO}"
        echo "Branch:   ${BRANCH_NAME}"
        echo "Subtask:  ${SUBTASK_ID:-root}"

        # ============================================================
        # Pre-flight checks — fail fast on unrecoverable issues
        # Exit 80-99 = FAIL (unretryable, won't reschedule)
        # ============================================================

        # Check 1: Required env vars
        for var in GITHUB_REPO BRANCH_NAME; do
          if [ -z "${!var:-}" ]; then
            echo "FATAL: Required env var $var is not set"
            exit 80
          fi
        done

        # Check 2: API key
        if [ -z "${NV_API_KEY:-}" ]; then
          echo "FATAL: NV_API_KEY not set. Check nv-api-key credential."
          exit 80
        fi

        # Check 3: Git auth
        bash /tmp/setup_git.sh
        if ! git ls-remote "${GITHUB_REPO}" HEAD > /dev/null 2>&1; then
          echo "FATAL: Cannot access ${GITHUB_REPO}. Check github-pat credential."
          exit 80
        fi

        # Check 4: Clone repo
        cd /workspace
        if git ls-remote --exit-code --heads "${GITHUB_REPO}" "${BRANCH_NAME}" > /dev/null 2>&1; then
          git clone --single-branch --branch "${BRANCH_NAME}" "${GITHUB_REPO}" repo
          cd repo
        else
          git clone --single-branch "${GITHUB_REPO}" repo
          cd repo
          git checkout -b "${BRANCH_NAME}"
        fi

        # Check 5: Verify push access
        if ! git push --dry-run origin "${BRANCH_NAME}" > /dev/null 2>&1; then
          echo "FATAL: Cannot push to ${BRANCH_NAME}. Check github-pat permissions (needs repo scope)."
          exit 80
        fi

        # Check 6: Verify storage access (if STORAGE_URI is set)
        if [ -n "${STORAGE_URI}" ]; then
          echo "Checking storage access: ${STORAGE_URI}"
          if ! osmo data check "${STORAGE_URI}" --access-type WRITE > /dev/null 2>&1; then
            echo "FATAL: Cannot write to ${STORAGE_URI}. Check storage credentials."
            exit 80
          fi
        fi

        echo "=== All pre-flight checks passed ==="

        echo "On branch: $(git branch --show-current)"

        # Write project-level settings to allow all tools (overrides CLAUDE.md)
        mkdir -p .claude
        cat > .claude/settings.json << 'CLSETTINGS'
        {
          "permissions": {
            "allow": [
              "Bash",
              "Read",
              "Write",
              "Edit",
              "Glob",
              "Grep",
              "WebFetch",
              "Agent",
              "Task",
              "TodoWrite",
              "WebSearch",
              "NotebookEdit"
            ],
            "deny": []
          }
        }
        CLSETTINGS

        # Initialize .agent/ if root agent and no task.json exists
        if [ -z "${SUBTASK_ID}" ] && [ ! -f .agent/task.json ]; then
          mkdir -p .agent/subtasks .agent/decisions .agent/discovered .agent/memory/episodes
          jq -n \
            --arg prompt "${TASK_PROMPT}" \
            --arg knowledge_doc "${KNOWLEDGE_DOC}" \
            --arg commit_prefix "${COMMIT_PREFIX}" \
            --arg created "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version:2, prompt:$prompt, knowledge_doc:$knowledge_doc, commit_prefix:$commit_prefix, created:$created}' \
            > .agent/task.json
          git add .agent/
          git commit -m "${COMMIT_PREFIX}: initialize agent"
          git push origin "${BRANCH_NAME}"
          echo "Initialized .agent/"
        elif [ -f .agent/task.json ]; then
          echo "Resuming. Task:"
          jq '.' .agent/task.json
          echo "Discovered:"
          ls .agent/discovered/ 2>/dev/null || echo "  (none)"
          echo "Subtasks:"
          ls .agent/subtasks/st-*.json >/dev/null 2>&1 && \
            for f in .agent/subtasks/st-*.json; do
              jq '{id:.id, phase:.phase, status:.status, scope:.scope}' "$f"
            done || echo "  (none)"
          echo "Decisions:"
          ls .agent/decisions/d-*.json >/dev/null 2>&1 && \
            for f in .agent/decisions/d-*.json; do
              jq '.decision' "$f"
            done || echo "  (none)"
        fi

        # Build prompts: system prompt (static framework) + user prompt (dynamic role/task context)
        SYSTEM_PROMPT_FILE="/osmo/agent/orchestrator-prompt.md"

        # Build user prompt with role context
        if [ -z "${SUBTASK_ID}" ]; then
          PROMPT="## Your Role: Root Agent

        You are the root agent. No one delegated to you — the human submitted this task directly.

        **Task prompt**: ${TASK_PROMPT}
        **Knowledge doc**: ${KNOWLEDGE_DOC}
        **Branch**: ${BRANCH_NAME}
        **Commit prefix**: ${COMMIT_PREFIX}

        Start by reading /osmo/agent/skills/discovery.md. Learn the repo. Then proceed with the task.
        "

        # Append additional context if provided
        if [ -n "${ADDITIONAL_CONTEXT}" ]; then
          PROMPT="${PROMPT}
        ## Additional Context (from user)

        ${ADDITIONAL_CONTEXT}
        "
        fi
        else
          PROMPT="## Your Role: Subtask Agent

        You were delegated subtask **${SUBTASK_ID}** by a parent agent.

        Read \`.agent/subtasks/${SUBTASK_ID}.json\` for your mandate: scope, files, description, phase.

        Your phase determines what to do:
        - **plan**: Explore your scope, fill in file_count/files/plan_details. Do NOT modify code.
        - **execute**: Modify code, run quality checks, commit, push. Or delegate to children if scope is large.
        - **validate**: Run validation checks, report results. Do NOT modify code.

        **Branch**: ${BRANCH_NAME}
        **Commit prefix**: ${COMMIT_PREFIX}
        "
        fi

        # Report container runtimes — the agent compares against repo targets during alignment
        CONTAINER_RUNTIMES=$(echo "python3=$(python3 --version 2>&1 | awk '{print $2}'), bazel=$(bazel --version 2>/dev/null | awk '{print $2}' || echo 'N/A'), go=$(go version 2>/dev/null | awk '{print $3}' | sed 's/go//' || echo 'N/A'), node=$(node --version 2>/dev/null || echo 'N/A')")

        # Append environment context
        PROMPT="${PROMPT}
        ## Environment

        - OSMO CLI: available (\`osmo workflow submit/query/cancel/logs\`, \`osmo data upload/download/list\`)
        - Storage URI: ${STORAGE_URI}
        - Framework tools: /osmo/agent/tools/
        - Workflow template: /osmo/agent/orchestrator.yaml
        - Working directory: $(pwd)
        - Knowledge doc: ${KNOWLEDGE_DOC:-not provided — discover from repo}
        - Additional context: ${ADDITIONAL_CONTEXT:-none}
        - Container runtimes: ${CONTAINER_RUNTIMES}
        - **These may not match the repo's targets. Phase 2 (Align runtime) must verify and fix any mismatches before proceeding.**
        "

        # ============================================================
        # Pre-flight: verify Bash works (quick test, no API call)
        # ============================================================
        echo "=== Pre-flight: Bash check ==="
        if echo "BASH_OK" | grep -q "BASH_OK"; then
          echo "Bash: OK"
        else
          echo "FATAL: Bash not available in container"
          exit 80
        fi

        # ============================================================
        # Run agent via Python SDK harness (OpenAI-compatible API)
        # Calls Claude via NVIDIA inference endpoint. No permission system.
        # ============================================================
        echo "Starting agent harness (subtask: ${SUBTASK_ID:-root})..."
        echo "Model: ${CLAUDE_MODEL:-azure/anthropic/claude-opus-4-6}"
        CLAUDE_LOG="/tmp/claude-output.log"
        set +e
        python3 /osmo/agent/agent-harness.py \
          --model "${CLAUDE_MODEL:-azure/anthropic/claude-opus-4-6}" \
          --system-prompt-file "${SYSTEM_PROMPT_FILE}" \
          --prompt "$PROMPT" \
          --checkpoint-interval 10 \
          --commit-prefix "${COMMIT_PREFIX}" 2>&1 | tee "$CLAUDE_LOG"
        EXIT_CODE=${PIPESTATUS[0]}
        set -e

        # Always commit and push any changes (code + .agent/ state)
        cd /workspace/repo
        git add -A 2>/dev/null || true
        if ! git diff --cached --quiet 2>/dev/null; then
          if [ $EXIT_CODE -eq 0 ]; then
            git commit -m "${COMMIT_PREFIX}: completed task" 2>/dev/null || true
          else
            git commit -m "${COMMIT_PREFIX}: auto-save on exit (code $EXIT_CODE)" 2>/dev/null || true
          fi
          echo "Pushing to ${BRANCH_NAME}..."
          if ! git push origin "${BRANCH_NAME}"; then
            echo "ERROR: git push failed. Retrying with verbose output..."
            git push origin "${BRANCH_NAME}" --verbose || echo "FATAL: git push failed twice"
          else
            echo "Changes pushed to ${BRANCH_NAME}."
          fi
        else
          echo "No uncommitted changes."
        fi

        exit $EXIT_CODE

default-values:
  agent_image: osmo-agent:latest
  github_repo: https://github.com/NVIDIA/osmo.git
  branch_name: agent/task
  storage_uri: ""
  task_prompt: ""
  knowledge_doc: ""
  commit_prefix: "agent"
  subtask_id: ""
  workflow_name: agent-orchestrator
  additional_context: ""
