syntax = "proto3";

package operator;

import "src/proto/operator/messages.proto";

option go_package = "go.corp.nvidia.com/osmo/proto/operator;operator";

// InitBackendRequest represents the request to initialize a backend
message InitBackendRequest {
  InitBody init_body = 1;
}

// InitBackendResponse represents the response to backend initialization
message InitBackendResponse {
  bool success = 1;
  string message = 2;
}

// HeartbeatMessage is sent periodically by the client to keep the NodeConditionStream alive.
message HeartbeatMessage {
  string time = 1;  // ISO 8601 timestamp
}

// NodeConditionStreamResponse wraps the server's response in the NodeConditionStream.
message NodeConditionStreamResponse {
  oneof response {
    NodeConditionsMessage node_conditions = 1;
    HeartbeatMessage heartbeat = 2;
  }
}

// ListenerService handles connections from workflow backends
service ListenerService {
  // Unary RPC for sending a single listener message and receiving an ACK.
  rpc SendListenerMessage(ListenerMessage) returns (AckMessage);

  // Bidirectional stream: client sends heartbeats to keep stream alive; server sends node
  // condition rule updates (initial rules from DB, then pushed on Redis queue updates).
  rpc NodeConditionStream(stream HeartbeatMessage) returns (stream NodeConditionStreamResponse);

  // Initialize a workflow backend
  rpc InitBackend(InitBackendRequest) returns (InitBackendResponse);
}
